<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A lightweight productivity dashboard with timer, tasks, and quick links">
  <title>Productivity Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="dashboard-container">
    <header class="dashboard-header">
      <h1>Productivity Dashboard</h1>
      <button class="theme-toggle" aria-label="Toggle theme">
        <span class="theme-icon">🌙</span>
      </button>
    </header>

    <main class="dashboard-main">
      <!-- Greeting Component -->
      <section class="greeting-section">
        <div id="greeting-container" class="greeting-component">
          <!-- Greeting content will be rendered here by JavaScript -->
        </div>
      </section>

      <!-- Focus Timer Component -->
      <section class="timer-section">
        <h2>Focus Timer</h2>
        <div id="timer-container" class="focus-timer">
          <!-- Timer content will be rendered here by JavaScript -->
        </div>
      </section>

      <!-- Task List Component -->
      <section class="tasks-section">
        <h2>Tasks</h2>
        <div id="tasks-container" class="task-list">
          <!-- Task list content will be rendered here by JavaScript -->
        </div>
      </section>

      <!-- Quick Links Component -->
      <section class="links-section">
        <h2>Quick Links</h2>
        <div id="links-container" class="quick-links">
          <!-- Quick links content will be rendered here by JavaScript -->
        </div>
      </section>
    </main>

    <footer class="dashboard-footer">
      <p>&copy; 2024 Productivity Dashboard</p>
    </footer>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
